services:
  - type: web
    name: resumia-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: FRONTEND_URL
        value: "*"
      - key: GEMINI_API_KEY
        sync: false
